<!doctype html>
<html lang="zh-Hant">
  <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Nudge 家長權限設定</title><link rel="stylesheet" href="assets/styles.css" /></head>
  <body data-page="guardian">
    <div class="shell"><aside class="sidebar"><a class="brand" href="index.html"><span class="brand-mark">N</span><span><strong>Nudge</strong><small>權限設定</small></span></a><nav class="nav"><a href="index.html">總覽入口</a><a class="active" href="guardian.html">家長陪伴中心</a></nav></aside>
      <main class="main">
        <header class="hero split"><div><span class="eyebrow">Permission Center</span><h1>權限分級是家長陪伴的核心。</h1><p>預設只看總覽，不顯示詳細任務內容、不顯示原始健康資料，孩子可隨時解除。</p><div class="subnav"><a href="guardian.html">中心總覽</a><a href="guardian-report.html">孩子週報</a><a href="guardian-encouragement.html">鼓勵卡</a><a href="guardian-goals.html">共同目標</a><a class="active" href="guardian-permissions.html">權限設定</a></div></div><div class="hero-card"><span>目前權限</span><strong>總覽</strong><p>保護孩子隱私。</p></div></header>
        <section class="permission-grid page-section">
          <article class="mini-card"><strong>只看總覽</strong><p>分數、完成率、趨勢。</p><button class="button primary" data-toast="已設定為只看總覽">啟用</button></article>
          <article class="mini-card"><strong>可看週報</strong><p>系統整理，不顯示原始資料。</p><button class="button ghost" data-toast="已允許查看週報">啟用</button></article>
          <article class="mini-card"><strong>可看任務類型</strong><p>只顯示學習、健康、生活類別。</p><button class="button ghost" data-toast="已允許查看任務類型">啟用</button></article>
          <article class="mini-card"><strong>可看健康趨勢</strong><p>不顯示原始睡眠或逐分鐘資料。</p><button class="button ghost" data-toast="已允許查看健康趨勢">啟用</button></article>
        </section>
        <section class="panel page-section"><span class="eyebrow">解除連結</span><h2>孩子端與家長端都可以解除。</h2><p>解除後家長無法再查看趨勢，既有週報只保留匿名摘要。</p><button class="button secondary" data-toast="已模擬解除陪伴連結">解除連結 Demo</button></section>
      </main>
    </div><script src="assets/app.js"></script>
  </body>
</html>
